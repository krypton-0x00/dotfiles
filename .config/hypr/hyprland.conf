# Github: Krypton-0x00
monitor=eDP-1,1920x1080@60,0x0,1
monitor=HDMI-A-2,1920x1080@180,1920x0,1

# Status bar :)
# exec-once=eww open bar
exec-once=waybar

#Notification
exec-once=dunst
# Wallpaper
exec-once=swaybg -o \* -i ~/.config/hypr/wallpapers/night.jpg -m fill
exec-once = wl-paste --type text --watch clipman store
exec-once = wl-paste --type image --watch clipman store
exec-once = blueman-applet


# For screen sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# For keyboard
exec-once=fcitx5 -D
# For lockscreen
# exec-once=swayidle -w timeout 200 'swaylock-fancy' ->  bug with swayidle

# Start Page
# exec-once=~/.config/hypr/scripts/startpage.sh

# Bluetooth
exec-once=blueman-applet 

# Screen Sharing
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 1.0 # for mouse cursor
    force_no_accel = 1
}


device {
    name = epic mouse V1
    sensitivity = -0.5
}


gestures {
    workspace_swipe = true
}

general {
    layout=dwindle

    gaps_in=5
    gaps_out=20
    border_size=2
    col.active_border=0xff5e81ac
    col.inactive_border=0x66333333

   
}

decoration {
    rounding=18
    blur {
        enabled=1
        size=6
        passes=2
        new_optimizations = true

    }
    # drop_shadow=true
    # shadow_range=15
    # col.shadow=0xffa7caff
    # col.shadow_inactive=0x50000000
}

blurls=waybar
blurls=lockscreen

animations {
    enabled=1
    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,popin
    animation=fade,1,10,default
    animation=workspaces,1,6,overshot,slide
    animation=border,1,10,default
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    # force_split=2
    force_split=0
    # no_gaps_when_only = true
}

master {
    new_on_top=true
    # no_gaps_when_only = true
}
cursor {
	no_hardware_cursors = true
}

misc {
    disable_hyprland_logo=true
    disable_splash_rendering=true
    mouse_move_enables_dpms=true
    vfr = false
}
# sources
source = ~/.config/hypr/keybindings.conf
