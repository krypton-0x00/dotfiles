# === VARIABLES === #

    # General
    $border     = 1     # Border width
    $gapS       = 4     # Inner gap
    $gapM       = 8     # Outer gap
    $radius     = 28    # Part 1 of bevels
    $power      = 1.0   # Part 2 of bevels
    $activeTr   = 1     # Opacity of active windows
    $inActiveTr = 1     # Opacity of inactive windows
	$timeout	= 900	# Wallpaper timeout time; 60 = 1 min, 900 = 15 min

    # Typography
    $font       = GeistMono Nerd Font
    $fontS      = 10
    $fontM      = 12
    $fontL      = 16
    $fontXL     = 64

    # Blur & Noise
    $blurSize   = 6
    $blurPass   = 4
    $noise      = 0.05

    # Colors
    # Used in theme.conf as two parts:
    # - The color value (rgb), ex. `FF0000`
    # - The alpha channel (a), ex. `FF`
    # Which looks like `rgba($re0$trF)`, but means `FF0000FF`, giving bright red

        # = Black (pure black for matrix)
        $no0 = 000000
        $no1 = 000000
        $no2 = 001000
        
        # = Red (primary red)
        $re0 = FF0000
        $re1 = 550000
        $re2 = 220000

        # = Green (red accent)
        $gr0 = CC0000
        $gr1 = 440000
        $gr2 = 180000

        # = Yellow
        $ye0 = F2D230
        $ye1 = 635618
        $ye2 = 332D10

        # = Blue
        $bl0 = CC0000
        $bl1 = 152966
        $bl2 = 0C1737

        # = Violet
        $vi0 = A130F2
        $vi1 = 421666
        $vi2 = 230D37

        # = Cyan
        $cy0 = CC0000
        $cy1 = 124E56
        $cy2 = 0B292F

        # = White
        $wh0 = CC6666
        $wh1 = 393B42
        $wh2 = 1E2025

        # = Grey
        $me0 = 4D5A80
        $me1 = 212638
        $me2 = 0D1120

        # = Orange
        $or0 = F26118
        $or1 = 63290E
        $or2 = 33170B

		# PINK
		$pi0 = F230B2
		$pi1 = 63164C
		$pi2 = 330D2A

        # = Transparency
        $tr0 = 00
        $tr2 = 20
        $tr5 = 50
        $tr7 = 70
        $trF = FF # Full
