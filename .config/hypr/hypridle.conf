general {
    lock_cmd = sh -c "pidof hyprlock || hyprlock"
    before_sleep_cmd = sh -c "pidof hyprlock || hyprlock"
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300 # 5 min - matrix rain screensaver
    on-timeout = sh -c "pidof kitty && hyprctl dispatch togglespecialworkspace screensaver || (kitty --class screensaver -e python3 ~/.config/hypr/scripts/matrix-rain &)"
    on-resume = sh -c "hyprctl dispatch togglespecialworkspace screensaver; pkill -f matrix-rain"
}

listener {
    timeout = 600 # 10 min - lock
    on-timeout = sh -c "pkill -f matrix-rain; loginctl lock-session"
}

listener {
    timeout = 1200 # 20 min - suspend
    on-timeout = sh -c "pkill -f matrix-rain; systemctl suspend || loginctl suspend"
}
