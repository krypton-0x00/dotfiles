format = """\
$os\
$shell\
┌─$username─$hostname─$directory─$git_branch$git_status$fill─$time─$cmd_duration\
$line_break\
$character\
"""

right_format = """\
$battery\
"""

[character]
success_symbol = "[└─❯](#00FF00)"
error_symbol = "[└─❯](#00CC00)"
vimcmd_symbol = "[└─❮](#00FF00)"
vimcmd_visual_symbol = "[└─❮](#00CC00)"
vimcmd_replace_symbol = "[└─❮](#005500)"
format = "$symbol "

[directory]
style = "bold #00FF00"
home_symbol = "~"
truncation_symbol = "../"
truncation_length = 2
fish_style_pwd_dir_length = 0
format = "[$path]($style)"

[directory.substitutions]
"Documents" = "doc"
"Downloads" = "dwn"
"Projects" = "prj"
"Desktop" = "desk"
".config" = "cfg"
"dotfiles" = "dots"
".local" = "loc"
"github" = "gh"

[git_branch]
style = "bold #00CC00"
symbol = " "
format = "[$symbol$branch]($style)"

[git_state]
style = "#005500"
rebase = "REBASE"
merge = "MERGE"
cherry_pick = "CHERRY"
revert = "REVERT"
bisec = "BISECT"
format = "[\($state( $progress_current/ $progress_total)\)]($style)"

[git_status]
style = "#005500"
conflicted = " 🏳"
ahead = " ⇡$count"
behind = " ⇣$count"
diverged = " ⇕$count"
untracked = " ?$count"
stashed = " 📦"
modified = " ✘$count"
staged = " +$count"
renamed = " »$count"
deleted = " ✖$count"
format = "([$all_status$ahead_behind]($style))"

[nodejs]
symbol = ""
style = "#005500"
format = "[$symbol$version]($style)"
detect_extensions = ["js", "ts", "jsx", "tsx", "node"]

[rust]
symbol = ""
style = "#005500"
format = "[$symbol$version]($style)"
detect_extensions = ["rs"]

[python]
symbol = ""
style = "#005500"
format = "via [$symbol$version]($style)"
detect_extensions = ["py"]

[golang]
symbol = ""
style = "#005500"
format = "[$symbol$version]($style)"
detect_extensions = ["go"]

[cmd_duration]
style = "#005500"
min_time = 1000
format = "⏱[$duration]($style)"

[time]
disabled = false
style = "bold #00FF00"
time_format = "%H:%M"
format = "[$time]($style)"

[line_break]
disabled = false

[os]
disabled = true

[shell]
disabled = true

[username]
show_always = true
style_root = "bold #00FF00"
style_user = "bold #00FF00"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold #00AA00"
format = "[@$hostname]($style)"

[battery]
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
format = "[$symbol$percentage]($style)"
display = [
  { threshold = 20, style = "#00CC00" },
  { threshold = 50, style = "#00AA00" },
  { style = "#005500" }
]

[status]
style = "#00CC00"
symbol = "✖"
format = "[$symbol$status_common_meaning]($style)"
pipestatus = true
pipestatus_separator = "|"
disabled = false

[fill]
symbol = "─"
style = "#005500"

[container]
style = "#005500"
symbol = "⬡"
format = "[$symbol$name]($style)"

[direnv]
style = "#005500"
format = "[direnv:$loaded]($style)"
