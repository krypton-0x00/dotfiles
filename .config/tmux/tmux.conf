set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#W"
set -g escape-time 10
set -g focus-events on
set -g status-interval 5
set -g status-left-length 50
set -g status-right-length 100
set -g status-justify centre

setw -g mode-keys vi
setw -g monitor-activity on
setw -g visual-activity off

set -g status-style "fg=#00FF00,bg=#000000"
set -g status-left "#[fg=#000000,bg=#00FF00] #S #[fg=#00FF00,bg=#000000] "
set -g status-right "#[fg=#005500]%Y-%m-%d %H:%M #[fg=#000000,bg=#00FF00] #H "

set -g window-status-format "#[fg=#00AA00,bg=#000000] #I:#W "
set -g window-status-current-format "#[fg=#000000,bg=#00FF00] #I:#W "
set -g window-status-separator " "

set -g pane-border-style "fg=#005500,bg=#000000"
set -g pane-active-border-style "fg=#00FF00,bg=#000000"
set -g display-panes-colour "#00FF00"
set -g display-panes-active-colour "#00FF00"
set -g message-style "fg=#00FF00,bg=#000000"
set -g message-command-style "fg=#00FF00,bg=#002200"
set -g copy-mode-match-style "fg=#000000,bg=#00FF00"
set -g copy-mode-current-match-style "fg=#000000,bg=#00CC00"
set -g mode-style "fg=#000000,bg=#00FF00"

set -g bell-action any
set -g window-status-bell-style "fg=#000000,bg=#00FF00"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

bind -r C-h previous-window
bind -r C-l next-window

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

run-shell 'printf "\033Ptmux;\033\033]12;#00FF00\007\033\\"'
