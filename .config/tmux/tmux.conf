set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#W"
set -g escape-time 10
set -g focus-events on
set -g status-interval 5
set -g status-left-length 50
set -g status-right-length 100
set -g status-justify centre

setw -g mode-keys vi
setw -g monitor-activity on
setw -g visual-activity off

set -g status-style "fg=#E61C24,bg=#1A1B1E"
set -g status-left "#[fg=#1A1B1E,bg=#E61C24] #S #[fg=#E61C24,bg=#1A1B1E] "
set -g status-right "#[fg=#2B2D31]%Y-%m-%d %H:%M #[fg=#1A1B1E,bg=#E61C24] #H "

set -g window-status-format "#[fg=#9E1B1E,bg=#1A1B1E] #I:#W "
set -g window-status-current-format "#[fg=#1A1B1E,bg=#E61C24] #I:#W "
set -g window-status-separator " "

set -g pane-border-style "fg=#2B2D31,bg=#1A1B1E"
set -g pane-active-border-style "fg=#E61C24,bg=#1A1B1E"
set -g display-panes-colour "#E61C24"
set -g display-panes-active-colour "#E61C24"
set -g message-style "fg=#E61C24,bg=#1A1B1E"
set -g message-command-style "fg=#E61C24,bg=#1A1B1E"
set -g copy-mode-match-style "fg=#1A1B1E,bg=#E61C24"
set -g copy-mode-current-match-style "fg=#1A1B1E,bg=#9E1B1E"
set -g mode-style "fg=#1A1B1E,bg=#E61C24"

set -g bell-action any
set -g window-status-bell-style "fg=#1A1B1E,bg=#E61C24"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

bind -r C-h previous-window
bind -r C-l next-window

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

run-shell 'printf "\033Ptmux;\033\033]12;#E61C24\007\033\\"'
