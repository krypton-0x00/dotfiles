set-option -g history-limit 25000
set -g mouse on

# leader
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# for neovim
set -sg escape-time 10
set-option -g focus-events on

# vi for copy mode
setw -g mode-keys vi

# renumber to remove gaps
set -g renumber-windows on

# vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# status bar
set -g status on
set -g status-bg default
set -g status-position top
set -g status-style "fg=#A6E3A1"
set -g status-left-style "fg=#928374"
set -g status-interval 1

set -g status-left "  "
set -g status-right "#(pomo)  "

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Toggle status bar with prefix + b
bind-key b set-option -g status

# reload configuration
bind-key -r r source-file ~/.config/tmux/tmux.conf

# True color setting (foot)
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-256color:RGB'

run-shell ~/github/tmux-resurrect/resurrect.tmux
